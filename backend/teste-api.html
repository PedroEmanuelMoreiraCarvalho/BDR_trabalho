<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testador de API - Backend</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: monospace;
      background: #0f1117;
      color: #e0e0e0;
      padding: 24px;
    }

    h1 {
      color: #7c3aed;
      margin-bottom: 24px;
      font-size: 1.4rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 16px;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2a2d3e;
      border-radius: 10px;
      padding: 16px;
    }

    .card h3 {
      color: #a78bfa;
      font-size: 0.85rem;
      margin-bottom: 4px;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .get {
      background: #064e3b;
      color: #34d399;
    }

    .post {
      background: #1e3a5f;
      color: #60a5fa;
    }

    .url {
      font-size: 0.78rem;
      color: #94a3b8;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .fields {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .fields input,
    .fields select {
      background: #0f1117;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 5px 8px;
      color: #e0e0e0;
      font-size: 0.8rem;
      font-family: monospace;
    }

    .fields input::placeholder {
      color: #4b5563;
    }

    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: #7c3aed;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.2s;
    }

    button:hover {
      background: #6d28d9;
    }

    button:disabled {
      background: #374151;
      cursor: not-allowed;
    }

    pre {
      background: #0f1117;
      border: 1px solid #2a2d3e;
      border-radius: 6px;
      padding: 10px;
      margin-top: 10px;
      font-size: 0.72rem;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: #86efac;
      display: none;
    }

    .error {
      color: #f87171;
    }

    .info-badge {
      display: inline-block;
      background: #2a2d3e;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.65rem;
      margin-left: 8px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <h1>🔌 Testador de API — Backend (localhost:3000)</h1>
  <div class="grid" id="grid"></div>

  <script>
    const BASE = 'http://localhost:3000';

    const rotas = [
      {
        nome: 'Teste de Conexão',
        metodo: 'GET',
        path: '/api/teste-conexao',
      },
      {
        nome: 'Gastos Gerais (Top 10)',
        metodo: 'GET',
        path: '/api/gastos',
      },
      // NOVO CARD: Gastos com Paginação e Filtros (POST)
      {
        nome: '📊 Gastos com Paginação e Filtros (POST)',
        metodo: 'POST',
        path: '/api/gastos',
        campos: [
          { key: 'page', placeholder: 'Página (padrão: 1)', default: '1' },
          { key: 'limit', placeholder: 'Itens por página (padrão: 10, máx: 100)', default: '10' },
          { key: 'partido', placeholder: 'Filtrar por sigla do partido (ex: PT, PL, PSDB)', default: '' },
          { key: 'uf', placeholder: 'Filtrar por UF (ex: SP, RJ, MG)', default: '' },
          { key: 'orderBy', placeholder: 'Ordenar por (gastos, name, partido, uf)', default: 'gastos' },
          { key: 'orderDirection', placeholder: 'ASC ou DESC', default: 'DESC' },
        ]
      },
      {
        nome: 'Escolaridade',
        metodo: 'GET',
        path: '/api/escolaridade',
      },
      {
        nome: 'Fornecedores Gerais (Top 10)',
        metodo: 'GET',
        path: '/api/fornecedores',
      },
      {
        nome: 'Alinhamento Partidário',
        metodo: 'GET',
        path: '/api/alinhamento-partidario',
      },
      {
        nome: 'Comparação Partidária',
        metodo: 'GET',
        path: '/api/comparacao-partidaria',
      },
      {
        nome: 'Nuvem de Palavras do Partido',
        metodo: 'GET',
        path: '/api/partidos/{sigla}/nuvem',
        campos: [
          { key: 'sigla', placeholder: 'Sigla do partido (ex: PT)', default: 'PT' },
        ]
      },
      {
        nome: 'Ranking Geral',
        metodo: 'POST',
        path: '/api/ranking',
        campos: [
          { key: 'pagina', placeholder: 'pagina (ex: 1)', default: '1' },
          { key: 'itensPorPagina', placeholder: 'itensPorPagina (ex: 5)', default: '5' },
          { key: 'filtroPartido', placeholder: 'filtroPartido (ex: PT ou Todos)', default: 'Todos' },
          { key: 'filtroUF', placeholder: 'filtroUF (ex: SP ou Todos)', default: 'Todos' },
          { key: 'metrica', placeholder: 'metrica (eficiencia ou gastos)', default: 'gastos' },
          { key: 'ordem', placeholder: 'ordem (asc ou desc)', default: 'desc' },
        ]
      },
      {
        nome: 'Perfil do Deputado',
        metodo: 'GET',
        path: '/api/deputados/{id}',
        campos: [
          { key: 'id', placeholder: 'ID do deputado (ex: 204554)', default: '204554' },
        ]
      },
      {
        nome: 'Nuvem de Palavras do Deputado',
        metodo: 'GET',
        path: '/api/deputados/{id}/nuvem',
        campos: [
          { key: 'id', placeholder: 'ID do deputado', default: '204554' },
        ]
      },
      {
        nome: 'Gastos por Tipo do Deputado',
        metodo: 'GET',
        path: '/api/deputados/{id}/gastos-tipo',
        campos: [
          { key: 'id', placeholder: 'ID do deputado', default: '204554' },
        ]
      },
      {
        nome: 'Fornecedores do Deputado',
        metodo: 'GET',
        path: '/api/deputados/{id}/fornecedores',
        campos: [
          { key: 'id', placeholder: 'ID do deputado', default: '204554' },
        ]
      },
      {
        nome: 'Votações do Deputado',
        metodo: 'POST',
        path: '/api/deputados/{id}/votacoes',
        campos: [
          { key: 'id', placeholder: 'ID do deputado', default: '204554' },
          { key: 'pagina', placeholder: 'pagina (ex: 1)', default: '1' },
          { key: 'itensPorPagina', placeholder: 'itensPorPagina (ex: 5)', default: '5' },
          { key: 'filtroTema', placeholder: 'filtroTema (ex: Todos)', default: 'Todos' },
          { key: 'busca', placeholder: 'busca (texto livre)', default: '' },
        ]
      },
      {
        nome: '🔍 Pesquisa Deputados por Nome',
        metodo: 'POST',
        path: '/api/deputados/pesquisa',
        campos: [
          { key: 'nome', placeholder: 'Nome do deputado (ex: Silva)', default: 'Silva' },
        ]
      },
      {
        nome: '🔍 Pesquisa Deputados por CPF',
        metodo: 'POST',
        path: '/api/deputados/cpf',
        campos: [
          { key: 'cpf', placeholder: 'CPF (ex: 12345678900 ou 123.456.789-00)', default: '' },
          { key: 'pagina', placeholder: 'pagina (ex: 1)', default: '1' },
          { key: 'itensPorPagina', placeholder: 'itensPorPagina (ex: 10)', default: '10' },
          { key: 'filtroPartido', placeholder: 'filtroPartido (ex: PT ou Todos)', default: 'Todos' },
          { key: 'filtroUF', placeholder: 'filtroUF (ex: SP ou Todos)', default: 'Todos' },
        ]
      },
      {
        nome: 'Ranking Benefício',
        metodo: 'POST',
        path: '/api/ranking-beneficio',
        campos: [
          { key: 'pagina', placeholder: 'pagina (ex: 1)', default: '1' },
          { key: 'itensPorPagina', placeholder: 'itensPorPagina (ex: 10)', default: '10' },
          { key: 'ordem', placeholder: 'ordem (asc ou desc)', default: 'desc' }
        ]
      }
    ];

    const grid = document.getElementById('grid');

    rotas.forEach((rota, i) => {
      const card = document.createElement('div');
      card.className = 'card';

      const urlId = `url-${i}`;
      const preId = `pre-${i}`;

      card.innerHTML = `
        <h3>${rota.nome}</h3>
        <span class="badge ${rota.metodo.toLowerCase()}">${rota.metodo}</span>
        <div class="url" id="${urlId}">${BASE}${rota.path}</div>
        <div class="fields" id="fields-${i}">
          ${(rota.campos || []).map(c => `
            <input data-key="${c.key}" placeholder="${c.placeholder}" value="${c.default || ''}" />
          `).join('')}
        </div>
        <button onclick="chamar(${i})">▶ Executar</button>
        <pre id="${preId}"></pre>
      `;

      grid.appendChild(card);
    });

    async function chamar(i) {
      const rota = rotas[i];
      const pre = document.getElementById(`pre-${i}`);
      const btn = document.querySelector(`#grid .card:nth-child(${i + 1}) button`);
      const inputs = document.querySelectorAll(`#fields-${i} input`);

      const vals = {};
      inputs.forEach(inp => { vals[inp.dataset.key] = inp.value; });

      let url = BASE + rota.path;
      if (vals.id) url = url.replace('{id}', vals.id);
      if (vals.sigla) url = url.replace('{sigla}', vals.sigla);

      const body = { ...vals };
      delete body.id;
      delete body.sigla;

      // Converte números para int quando necessário
      if (rota.path === '/api/gastos' && rota.metodo === 'POST') {
        if (body.page) body.page = parseInt(body.page);
        if (body.limit) body.limit = parseInt(body.limit);
        if (body.orderDirection) body.orderDirection = body.orderDirection.toUpperCase();
        // Remove campos vazios para não sobrecarregar
        if (body.partido === '') delete body.partido;
        if (body.uf === '') delete body.uf;
        if (body.orderBy === '') delete body.orderBy;
      }

      if (rota.path === '/api/deputados/cpf' && body.cpf) {
        body.cpf = body.cpf.replace(/\D/g, '');
        if (body.filtroPartido === 'Todos') delete body.filtroPartido;
        if (body.filtroUF === 'Todos') delete body.filtroUF;
        if (body.pagina) body.pagina = parseInt(body.pagina);
        if (body.itensPorPagina) body.itensPorPagina = parseInt(body.itensPorPagina);
      }

      pre.style.display = 'block';
      pre.className = '';
      pre.textContent = '⏳ Buscando...';
      btn.disabled = true;

      try {
        const opts = { method: rota.metodo };
        if (rota.metodo === 'POST') {
          opts.headers = { 'Content-Type': 'application/json' };
          opts.body = JSON.stringify(body);
        }

        const resp = await fetch(url, opts);
        const json = await resp.json();

        let outputText = JSON.stringify(json, null, 2);

        if (rota.path === '/api/deputados/cpf' && json.results) {
          outputText += '\n\n📊 RESUMO:\n';
          outputText += `Total de resultados: ${json.total}\n`;
          outputText += `Página: ${json.pagina || 1}\n`;
          outputText += `Itens por página: ${json.itensPorPagina || 10}\n`;
          if (json.cpf_pesquisado) outputText += `CPF pesquisado: ${json.cpf_pesquisado}\n`;
        }

        if (rota.path === '/api/deputados/pesquisa' && Array.isArray(json)) {
          outputText += '\n\n📊 RESUMO:\n';
          outputText += `Total de deputados encontrados: ${json.length}\n`;
          if (json.length > 0) {
            outputText += `\n📋 LISTA RÁPIDA:\n`;
            json.slice(0, 5).forEach((dep, idx) => {
              outputText += `${idx + 1}. ${dep.nome} (${dep.partido}/${dep.uf})\n`;
            });
            if (json.length > 5) outputText += `... e mais ${json.length - 5} deputados\n`;
          }
        }

        pre.textContent = outputText;
        if (!resp.ok) pre.className = 'error';
      } catch (err) {
        pre.className = 'error';
        pre.textContent = '❌ Erro: ' + err.message + '\n\nVerifique se o servidor backend está rodando em localhost:3000';
      } finally {
        btn.disabled = false;
      }
    }

    window.chamar = chamar;
  </script>
</body>

</html>
